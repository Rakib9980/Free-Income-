<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lethal Pro - Dual Interface</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #00f2ff;
            --admin-gold: #ffcc00;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        /* --- ১. ম্যাথ ভেরিফিকেশন স্ক্রিন --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .math-box {
            background: var(--glass); border: 1px solid var(--neon); padding: 30px;
            border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }
        .math-box h2 { font-family: 'Orbitron'; color: var(--neon); margin-bottom: 20px; font-size: 18px; }
        #math-quest { font-size: 32px; font-weight: 900; margin-bottom: 20px; color: #fff; }
        .math-input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            border-radius: 12px; color: var(--neon); font-size: 24px; text-align: center;
        }

        /* --- ২. ড্যাশবোর্ড লেআউট --- */
        .app-container { display: none; height: 100vh; flex-direction: column; }

        /* প্রোফাইল বার */
        .profile-bar {
            padding: 15px 20px; display: flex; align-items: center;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(0,242,255,0.1);
        }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon); margin-right: 12px; }
        .u-info h4 { margin: 0; font-size: 15px; }
        .u-info p { margin: 0; font-size: 10px; color: var(--neon); }

        /* ব্যালেন্স কার্ড */
        .hero { padding: 20px; }
        .bal-card {
            background: linear-gradient(135deg, #0a0a0a, #000); padding: 25px;
            border-radius: 24px; border: 1px solid rgba(0,242,255,0.2);
            position: relative; overflow: hidden;
        }
        .bal-val { font-size: 40px; font-family: 'Orbitron'; font-weight: 900; margin-top: 10px; }

        /* ৩. ইন্টারফেস (User & Admin) */
        .view { flex: 1; padding: 0 20px 100px; overflow-y: auto; display: none; }
        .view.active { display: block; }

        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 18px; margin-bottom: 15px;
            display: flex; align-items: center; transition: 0.3s;
        }
        .card:active { transform: scale(0.97); background: rgba(0,242,255,0.1); }
        .icon-sq { width: 45px; height: 45px; background: rgba(0,242,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--neon); }

        /* এডমিন বাটন */
        .admin-btn { background: var(--admin-gold); color: #000; font-weight: 900; border: none; width: 100%; padding: 15px; border-radius: 12px; margin-top: 10px; }

        /* ৪. বটম নেভ */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid rgba(0,242,255,0.2); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .n-item { text-align: center; color: #444; }
        .n-item.active { color: var(--neon); }
        .n-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .n-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="math-box">
            <h2>SECURITY VERIFICATION</h2>
            <div id="math-quest"></div>
            <input type="number" id="math-ans" class="math-input" placeholder="উত্তর লিখুন" oninput="checkMath()">
            <p style="margin-top:20px; font-size:11px; color:#555;">PROVE YOU ARE NOT A BOT</p>
        </div>
    </div>

    <div class="app-container" id="main-app">
        
        <div class="profile-bar">
            <img src="" id="u_photo" class="avatar">
            <div class="u-info">
                <h4 id="u_name">LOADING...</h4>
                <p id="u_role">USER ACCOUNT</p>
            </div>
            <div id="admin-badge" style="display:none; margin-left:auto; background:var(--admin-gold); color:#000; font-size:10px; padding:4px 10px; border-radius:20px; font-weight:900;">OWNER</div>
        </div>

        <div class="hero">
            <div class="bal-card">
                <div style="font-size:10px; letter-spacing:2px; color:#666;">TOTAL BALANCE</div>
                <div class="bal-val">৳ <span id="balance">0.00</span></div>
            </div>
        </div>

        <div id="user-view" class="view">
            <div class="card" onclick="claimBonus()">
                <div class="icon-sq"><i class="fas fa-gift"></i></div>
                <div style="flex:1; margin-left:15px;">
                    <b>Daily Reward</b><br><span id="bonus-timer" style="font-size:10px; color:#555;">৳০.৫০ ক্লেম করুন</span>
                </div>
            </div>
            <div class="card" onclick="tg.showAlert('রেফারেল সিস্টেম মেইনটেন্যান্স চলছে।')">
                <div class="icon-sq"><i class="fas fa-users"></i></div>
                <div style="flex:1; margin-left:15px;"><b>Refer & Earn</b><br><span style="font-size:10px; color:#555;">Invite friends to earn cash</span></div>
            </div>
        </div>

        <div id="admin-view" class="view">
            <h4 style="color:var(--admin-gold); letter-spacing:2px; font-family:'Orbitron';">OWNER CONTROL</h4>
            <div class="card" style="border-color:var(--admin-gold)">
                <div class="icon-sq" style="color:var(--admin-gold)"><i class="fas fa-plus-circle"></i></div>
                <div style="flex:1; margin-left:15px;"><b>Add New Task</b><br><span>নতুন কাজ লাইভ করুন</span></div>
            </div>
            <div class="card" style="border-color:var(--admin-gold)">
                <div class="icon-sq" style="color:var(--admin-gold)"><i class="fas fa-wallet"></i></div>
                <div style="flex:1; margin-left:15px;"><b>Withdraw Requests</b><br><span>পেমেন্ট রিকোয়েস্ট চেক করুন</span></div>
            </div>
            <button class="admin-btn">GLOBAL BROADCAST</button>
        </div>

        <nav>
            <div class="n-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><span>Dashboard</span></div>
            <div class="n-item" onclick="tg.showAlert('No tasks right now!')"><i class="fas fa-bolt"></i><span>Missions</span></div>
            <div class="n-item" onclick="tg.showAlert('Syncing Wallet...')"><i class="fas fa-wallet"></i><span>Wallet</span></div>
            <div class="n-item" onclick="tg.openTelegramLink('https://t.me/YourAdmin')"><i class="fas fa-headset"></i><span>Support</span></div>
        </nav>

    </div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    const OWNER_ID = 8562914479; // আপনার আইডি

    // ১. ম্যাথ জেনারেটর
    let num1 = Math.floor(Math.random() * 20) + 10;
    let num2 = Math.floor(Math.random() * 10) + 5;
    let correctAns = num1 + num2;
    document.getElementById('math-quest').innerText = `${num1} + ${num2} = ?`;

    function checkMath() {
        let val = document.getElementById('math-ans').value;
        if(parseInt(val) === correctAns) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            initApp();
        }
    }

    // ২. অ্যাপ ইনিশিয়ালাইজ
    let balance = parseFloat(localStorage.getItem('bal')) || 0.00;
    
    function initApp() {
        const user = tg.initDataUnsafe?.user;
        document.getElementById('balance').innerText = balance.toFixed(2);

        if(user) {
            document.getElementById('u_name').innerText = user.first_name.toUpperCase();
            if(user.photo_url) document.getElementById('u_photo').src = user.photo_url;
            else document.getElementById('u_photo').src = "https://ui-avatars.com/api/?background=00f2ff&color=000&name=" + user.first_name;

            // অ্যাডমিন চেক
            if(user.id === OWNER_ID) {
                document.getElementById('u_role').innerText = "SYSTEM ADMINISTRATOR";
                document.getElementById('admin-badge').style.display = 'block';
                document.getElementById('admin-view').classList.add('active');
            } else {
                document.getElementById('user-view').classList.add('active');
            }
        }
        checkBonusStatus();
    }

    // ৩. ডেইলি বোনাস লজিক (২৪ ঘণ্টা)
    function claimBonus() {
        const last = localStorage.getItem('lastBonus');
        const now = Date.now();
        if(last && now - last < 86400000) {
            tg.showAlert("আবার ২৪ ঘণ্টা পর ট্রাই করুন!");
            return;
        }
        balance += 0.50;
        localStorage.setItem('bal', balance);
        localStorage.setItem('lastBonus', now);
        document.getElementById('balance').innerText = balance.toFixed(2);
        tg.showAlert("✅ ৳০.৫০ যোগ হয়েছে!");
        checkBonusStatus();
    }

    function checkBonusStatus() {
        const last = localStorage.getItem('lastBonus');
        if(last && Date.now() - last < 86400000) {
            document.getElementById('bonus-timer').innerText = "Claimed (Wait 24h)";
        }
    }

    function switchTab(tab) {
        tg.HapticFeedback.impactOccurred('medium');
        // আপনি চাইলে এখানে আরও ট্যাব যোগ করতে পারেন
    }

</script>

</body>
</html>
