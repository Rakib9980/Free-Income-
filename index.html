<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAMOND ELITE | FIX EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #00D2FF; --diamond: #E0EAFC; --gold: #FFD700; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% -20%, #1a2a6c, #050505); }

        /* Intro Ad */
        #ad-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .diamond-logo { font-size: 80px; color: var(--primary); margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Security */
        #captcha-screen { position: fixed; inset: 0; background: #050505; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .math-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 30px 60px; border-radius: 30px; margin-bottom: 30px; }

        /* App Main */
        .premium-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar-box { width: 50px; height: 50px; padding: 2px; background: linear-gradient(45deg, #00d2ff, #f06); border-radius: 15px; animation: hue 3s infinite; }
        @keyframes hue { 100% { filter: hue-rotate(360deg); } }
        .avatar-box img { width: 100%; height: 100%; border-radius: 13px; object-fit: cover; }
        
        .compact-wallet { text-align: right; background: rgba(255,255,255,0.05); padding: 8px 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); }
        .compact-wallet b { font-size: 18px; color: var(--primary); display: block; }

        /* Content Area */
        .main-container { height: calc(100vh - 160px); overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Diamond Task Card */
        .diamond-card { background: var(--glass); border-radius: 22px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .task-img { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; border: 2px solid var(--primary); cursor: zoom-in; }
        .task-price { color: #00FF88; font-weight: 900; font-size: 13px; background: rgba(0,255,136,0.1); padding: 2px 10px; border-radius: 8px; }

        /* Image Viewer (FIXED) */
        #img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 30000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #img-viewer img { max-width: 90%; max-height: 80vh; border-radius: 20px; border: 2px solid var(--primary); }
        .close-img { position: absolute; top: 40px; right: 25px; color: #fff; font-size: 35px; }

        /* Dock (FIXED ICON) */
        .vip-dock { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: #000; display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .dock-item { color: #555; text-align: center; flex: 1; transition: 0.3s; }
        .dock-item.active { color: var(--primary); }
        .dock-item i { font-size: 24px; display: block; margin-bottom: 4px; }
        .dock-item span { font-size: 10px; font-weight: 800; }

        /* Premium Buttons */
        .elite-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 900; background: linear-gradient(90deg, #4facfe, #00f2fe); color: #fff; cursor: pointer; }
        .elite-input { width: 100%; padding: 18px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="img-viewer">
        <span class="close-img" onclick="closeImg()"><i class="fa-solid fa-xmark"></i></span>
        <img id="full-img" src="">
    </div>

    <div id="ad-screen">
        <div class="diamond-logo"><i class="fa-solid fa-gem"></i></div>
        <h1 style="font-weight: 900; letter-spacing: 2px;">DIAMOND ELITE</h1>
        <p style="color: #888; margin: 20px 0 40px; font-size: 14px;">The Ultimate Freelancing Powerhouse 2026.</p>
        <button class="elite-btn" onclick="goCaptcha()" style="width: auto; padding: 15px 50px;">GET STARTED</button>
    </div>

    <div id="captcha-screen">
        <div class="math-card"><div id="math-ques" style="font-size: 40px; font-weight: 900; color: var(--primary);"></div></div>
        <input type="number" id="math-ans" placeholder="Enter Result" class="elite-input" style="text-align:center; max-width: 250px;">
        <button class="elite-btn" onclick="verify()" style="max-width: 250px;">UNLOCK APP</button>
    </div>

    <div id="main-app" style="display:none;">
        <header class="premium-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar-box"><img id="u_avatar" src=""></div>
                <div><b id="u_name" style="font-size:14px;">...</b><span style="font-size:9px; color:var(--primary); font-weight:900; display:block;">ELITE MEMBER</span></div>
            </div>
            <div class="compact-wallet"><span>Diamond Bal</span><b id="u_bal">৳ 0.00</b></div>
        </header>

        <div class="main-container">
            <div id="home" class="page active">
                <h4 style="margin-bottom:15px; color:#555; letter-spacing:1px;">ACTIVE MISSIONS</h4>
                <div id="mission-list"></div>
            </div>

            <div id="wallet" class="page">
                <div style="background:var(--glass); padding:25px; border-radius:25px; border:1px solid rgba(255,255,255,0.1);">
                    <h3 style="margin-bottom:15px;">DIAMOND BANK</h3>
                    <select id="w_method" class="elite-input"><option>BKASH</option><option>NAGAD</option></select>
                    <input type="number" id="w_num" placeholder="Wallet Number" class="elite-input">
                    <input type="number" id="w_amt" placeholder="Amount (৳)" class="elite-input">
                    <button class="elite-btn" onclick="withdraw()">WITHDRAW NOW</button>
                </div>
            </div>

            <div id="refer" class="page">
                <div style="text-align:center; padding:30px; background:var(--glass); border-radius:30px;">
                    <i class="fa-solid fa-link" style="font-size:50px; color:var(--primary); margin-bottom:15px;"></i>
                    <h3>Invite Network</h3>
                    <p style="color:#888; font-size:12px; margin:10px 0;">রেফারে ২ টাকা ডায়ামন্ড বোনাস!</p>
                    <div id="ref_link" style="padding:15px; background:rgba(0,0,0,0.3); border-radius:15px; border:1px dashed var(--primary); font-size:10px; word-break:break-all; margin-bottom:20px; color:var(--primary);">...</div>
                    <button class="elite-btn" onclick="copy()">COPY LINK</button>
                </div>
            </div>
        </div>

        <nav class="vip-dock">
            <div class="dock-item active" onclick="nav('home', this)"><i class="fa-solid fa-bolt"></i><span>Home</span></div>
            <div class="dock-item" onclick="nav('wallet', this)"><i class="fa-solid fa-building-columns"></i><span>Bank</span></div>
            <div class="dock-item" onclick="nav('refer', this)"><i class="fa-solid fa-share-nodes"></i><span>Refer</span></div>
        </nav>
    </div>

    <div id="m_modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); z-index:15000; display:none; align-items:center; justify-content:center; padding:25px;">
        <div style="background:#111; width:100%; border-radius:35px; padding:30px; border:1px solid rgba(255,255,255,0.1); text-align:center;">
            <h2 id="m_title" style="color:var(--primary); margin-bottom:15px;"></h2>
            <div id="m_desc" style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; color:#aaa; font-size:13px; text-align:left; margin-bottom:20px;"></div>
            <input type="text" id="p_proof" placeholder="Type Proof Here" class="elite-input">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="elite-btn" style="background:#fff; color:#000;" id="m_link_btn">GET LINK</button>
                <button class="elite-btn" onclick="submitWork()">SUBMIT</button>
            </div>
            <p onclick="closeM()" style="margin-top:20px; color:#555; cursor:pointer;">DISMISS</p>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBL-1gCDQXt7f2s3UVmEAhzotCneBkg1dM", databaseURL: "https://free-income-tax-6d428-default-rtdb.firebaseio.com", projectId: "free-income-tax-6d428" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tg = window.Telegram.WebApp;
    tg.expand();

    let uID = tg.initDataUnsafe?.user?.id || "778899";
    let refBy = tg.initDataUnsafe?.start_param || null;
    let activeGig = null;
    let captchaRes = 0;

    function goCaptcha() { document.getElementById('ad-screen').style.display = 'none'; document.getElementById('captcha-screen').style.display = 'flex'; gen(); }
    function gen() { let n1 = Math.floor(Math.random()*15)+5; let n2 = Math.floor(Math.random()*10)+2; captchaRes = n1+n2; document.getElementById('math-ques').innerText = n1+" + "+n2; }
    function verify() { if(parseInt(document.getElementById('math-ans').value) === captchaRes) { document.getElementById('captcha-screen').style.display='none'; document.getElementById('main-app').style.display='block'; init(); } else { tg.showAlert("Incorrect!"); gen(); } }

    function openImg(url) { 
        document.getElementById('full-img').src = url; 
        document.getElementById('img-viewer').style.display = 'flex'; 
        tg.HapticFeedback.impactOccurred('medium'); 
    }
    function closeImg() { document.getElementById('img-viewer').style.display = 'none'; }

    function init() {
        const user = tg.initDataUnsafe?.user;
        document.getElementById('u_name').innerText = (user?.first_name || "DIAMOND USER").toUpperCase();
        document.getElementById('u_avatar').src = user?.photo_url || "https://ui-avatars.com/api/?name=D&background=00d2ff&color=fff";
        document.getElementById('ref_link').innerText = "https://t.me/FREEINCOMETAX2026_BOT?start=" + uID;
        db.ref('users/' + uID).on('value', s => {
            if(!s.exists()) { db.ref('users/' + uID).set({ balance: 0, refBy: refBy || "none" }); if(refBy && refBy !== uID.toString()) db.ref('users/'+refBy+'/balance').transaction(b=>(b||0)+2); }
            document.getElementById('u_bal').innerText = "৳ " + (s.val().balance || 0).toFixed(2);
        });
        loadTasks();
    }

    function loadTasks() {
        db.ref('tasks').on('value', snap => {
            let html = "";
            snap.forEach(child => {
                const t = child.val();
                html += `<div class="diamond-card">
                    <img src="${t.image}" class="task-img" onclick="openImg('${t.image}')">
                    <div style="flex:1;" onclick="openM('${child.key}')">
                        <b style="font-size:15px;">${t.name}</b><br>
                        <span class="task-price">৳ ${t.reward}</span>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="opacity:0.2" onclick="openM('${child.key}')"></i>
                </div>`;
            });
            document.getElementById('mission-list').innerHTML = html || "<p style='text-align:center; color:#333;'>Loading...</p>";
        });
    }

    function openM(id) {
        db.ref('tasks/'+id).once('value', s => {
            activeGig = {...s.val(), id: id};
            document.getElementById('m_title').innerText = activeGig.name;
            document.getElementById('m_desc').innerText = activeGig.desc;
            document.getElementById('m_link_btn').onclick = () => window.open(activeGig.link, '_blank');
            document.getElementById('m_modal').style.display = 'flex';
        });
    }
    function closeM() { document.getElementById('m_modal').style.display = 'none'; }
    function submitWork() {
        const p = document.getElementById('p_proof').value;
        if(!p) return tg.showAlert("Proof required!");
        db.ref('proofs').push({ userId: uID, taskName: activeGig.name, reward: activeGig.reward, proof: p, status: 'pending', time: Date.now() });
        tg.showAlert("Submitted!"); closeM();
    }
    function withdraw() {
        const a = parseFloat(document.getElementById('w_amt').value);
        if(a < 20) return tg.showAlert("Min ৳20");
        db.ref('users/'+uID+'/balance').once('value', s => {
            if(s.val() < a) return tg.showAlert("Low Balance!");
            db.ref('users/'+uID+'/balance').set(s.val()-a);
            db.ref('withdraws').push({ userId: uID, amount: a, number: document.getElementById('w_num').value, method: document.getElementById('w_method').value, status: 'pending', time: Date.now() });
            tg.showAlert("Success!");
        });
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.dock-item').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function copy() { navigator.clipboard.writeText(document.getElementById('ref_link').innerText); tg.showAlert("Copied!"); }
</script>
</body>
    </html>
