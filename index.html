<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Romantic Task & Earn App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758c;
            --gold: #ffd700;
            --bg: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            min-height: 100vh;
            -webkit-user-select: none;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        /* প্রোফাইল সেকশন */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .user-name { font-size: 20px; font-weight: 600; margin: 5px 0; letter-spacing: 1px; }
        .balance-box { margin: 15px 0; }
        .balance-label { font-size: 12px; color: #bbb; text-transform: uppercase; letter-spacing: 2px; }
        .balance-amount { font-size: 40px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 15px;
        }
        .stat-item { font-size: 13px; color: #eee; }
        .stat-item b { color: var(--primary); }

        /* মেনু গ্রিড */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .menu-btn {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:active { transform: scale(0.92); background: rgba(255, 77, 109, 0.15); }

        .menu-btn i { font-size: 28px; margin-bottom: 10px; color: var(--secondary); }
        .menu-btn span { font-size: 14px; font-weight: 500; }

        .btn-large {
            grid-column: span 2;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }
        .btn-large i { color: white; }

        /* ফুটার */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            padding-bottom: 20px;
        }
        .heart { color: var(--primary); animation: heartbeat 1.5s infinite; display: inline-block; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="user-pic" class="avatar">
            <div class="user-name" id="user-name">প্রিয় মেম্বার</div>
            
            <div class="balance-box">
                <p class="balance-label">বর্তমান ব্যালেন্স</p>
                <div class="balance-amount">৳ <span id="user-balance">0.00</span></div>
            </div>

            <div class="stats-row">
                <div class="stat-item">👥 রেফার: <b id="user-refers">0</b></div>
                <div class="stat-item">✅ টাস্ক: <b id="user-tasks">0</b></div>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-btn btn-large" onclick="openSection('🎯 টাস্ক')">
                <i class="fas fa-tasks"></i>
                <span>কাজ করে টাকা ইনকাম করুন</span>
            </div>

            <div class="menu-btn" onclick="claimBonus()">
                <i class="fas fa-gift"></i>
                <span>ডেইলি বোনাস</span>
            </div>

            <div class="menu-btn" onclick="copyReferLink()">
                <i class="fas fa-user-plus"></i>
                <span>রেফার লিঙ্ক</span>
            </div>

            <div class="menu-btn" onclick="openSection('💸 উইথড্র')">
                <i class="fas fa-wallet"></i>
                <span>টাকা উত্তোলন</span>
            </div>

            <div class="menu-btn" onclick="openSection('📜 হিস্টোরি')">
                <i class="fas fa-history"></i>
                <span>লেনদেন তালিকা</span>
            </div>

            <div class="menu-btn" onclick="contactSupport()">
                <i class="fas fa-headset"></i>
                <span>সাপোর্ট সেন্টার</span>
            </div>
        </div>

        <div class="footer">
            সিস্টেম সংস্করণ ৩.০.১ <br>
            আপনার জন্য ভালোবাসা সহ তৈরি <span class="heart">❤</span>
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ
        let tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটি পুরো স্ক্রিনে ওপেন হবে
        tg.headerColor = '#0f0c29';
        tg.ready();

        // ১. ইউজারের রিয়েল ডাটা টেলিগ্রাম থেকে নেওয়া
        const userData = tg.initDataUnsafe?.user;
        if (userData) {
            document.getElementById('user-name').innerText = userData.first_name + (userData.last_name ? " " + userData.last_name : "");
            if (userData.photo_url) {
                document.getElementById('user-pic').src = userData.photo_url;
            }
        }

        // ২. বোনাস ফাংশন
        function claimBonus() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showConfirm("আপনি কি আজকের বোনাস ৳০.৫০ সংগ্রহ করতে চান?", (confirmed) => {
                if (confirmed) {
                    tg.showAlert("🎉 অভিনন্দন! বোনাস সফলভাবে আপনার ওয়ালেটে যোগ হয়েছে।");
                    // এখানে আপনি আপনার ব্যাকেন্ড এপিআই কল করতে পারেন ব্যালেন্স আপডেট করার জন্য
                }
            });
        }

        // ৩. রেফার লিঙ্ক কপি ফাংশন
        function copyReferLink() {
            tg.HapticFeedback.notificationOccurred('success');
            const uid = userData ? userData.id : '123456';
            const botUser = "YourBotName"; // এখানে আপনার বটের ইউজারনেম দিন
            const refLink = `https://t.me/${botUser}?start=${uid}`;
            
            tg.showPopup({
                title: '🔗 রেফার লিঙ্ক',
                message: `আপনার লিঙ্ক: ${refLink}\n\nপ্রতি রেফারে পাবেন ৳২.০০।`,
                buttons: [{text: 'বন্ধ করুন', type: 'close'}]
            });
        }

        // ৪. সাধারণ সেকশন ওপেন ফাংশন
        function openSection(name) {
            tg.HapticFeedback.selectionChanged();
            tg.showAlert(name + " সেকশনটি বর্তমানে লোড হচ্ছে। অনুগ্রহ করে অপেক্ষা করুন...");
        }

        // ৫. সাপোর্ট ফাংশন
        function contactSupport() {
            tg.openTelegramLink("https://t.me/YourAdminID"); // এখানে এডমিন আইডি দিন
        }

        // ৬. সিস্টেম ভাইব্রেশন (হ্যাপটিক)
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                tg.HapticFeedback.impactOccurred('light');
            });
        });

    </script>
</body>
</html>
