<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DIAMOND ELITE | V7 PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --p: #00D2FF; --g: #FFD700; --glass: rgba(255, 255, 255, 0.08); --success: #00FF88; --danger: #FF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100vh; background-image: radial-gradient(circle at 50% -20%, #1a2a6c, #050505); }

        .screen { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #auth-screen { display: none; overflow-y: auto; }
        #main-app { display: none; height: 100vh; overflow-y: auto; padding: 85px 15px 110px; }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.3s ease; }

        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .u-pic { width: 45px; height: 45px; border-radius: 12px; border: 2.5px solid var(--p); object-fit: cover; background: #111; cursor: pointer; transition: 0.3s; }
        .u-pic:active { transform: scale(0.9); }
        
        .task-card { background: var(--glass); border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .task-half-img { width: 100%; height: 130px; object-fit: cover; opacity: 0.8; }
        .task-body { padding: 15px; text-align: center; }
        .price-tag { color: var(--success); font-weight: 900; font-size: 22px; display: block; margin: 5px 0 15px; }

        .btn-elite { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 900; background: linear-gradient(90deg, #4facfe, #00f2fe); color: #fff; text-transform: uppercase; cursor: pointer; }
        .input-elite { width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 12px; text-align: center; font-size: 16px; }

        .podium-box { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 30px; padding-top: 40px; }
        .podium-item { display: flex; flex-direction: column; align-items: center; position: relative; width: 90px; }
        .pod-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #222; border: 3px solid #444; }
        .crown-icon { position: absolute; top: -28px; font-size: 25px; z-index: 10; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(5,5,5,0.95); border-top: 1px solid rgba(255,255,255,0.1); display: flex; padding-bottom: 10px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        #task-details-page { position: fixed; inset: 0; background: #050505; z-index: 8000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 50px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 10px; }
        .emoji-btn { font-size: 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="ad-screen" class="screen">
        <img src="https://img.freepik.com/premium-vector/online-money-making-business-concept-people-work-with-laptop-earn-money-from-internet_269730-281.jpg" style="width:90%; border-radius:20px; margin-bottom:30px; border:2px solid var(--p);">
        <div id="ad-timer" style="font-size:50px; font-weight:900; color:var(--p);">5</div>
        <p>ইনকাম লোড হচ্ছে...</p>
    </div>

    <div id="auth-screen" class="screen">
        <div style="background:var(--glass); padding:25px; border-radius:30px; width:90%; max-width:360px; border:1px solid var(--p);">
            <h2 style="color:var(--g); margin-bottom:20px;">নতুন অ্যাকাউন্ট</h2>
            <input type="text" id="reg-user" class="input-elite" placeholder="টেলিগ্রাম ইউজারনেম">
            <input type="number" id="reg-phone" class="input-elite" placeholder="মোবাইল নম্বর">
            <input type="email" id="reg-email" class="input-elite" placeholder="ইমেইল অ্যাড্রেস">
            <input type="password" id="reg-pass" class="input-elite" placeholder="পাসওয়ার্ড">
            <input type="password" id="reg-cpass" class="input-elite" placeholder="কনফার্ম পাসওয়ার্ড">
            <input type="text" id="reg-ref" class="input-elite" placeholder="রেফার আইডি (ঐচ্ছিক)" style="border-color:var(--g)">
            <button class="btn-elite" onclick="registerUser()">রেজিস্ট্রেশন করুন</button>
        </div>
    </div>

    <div id="main-app">
        <header class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="u_pic" class="u-pic" onclick="showEmojiPicker()">
                <div><b id="u_name">...</b><br><small id="u_id" style="color:var(--p); font-size:10px;"></small></div>
            </div>
            <b id="u_bal" style="font-size:22px; color:var(--p);">৳ 0.00</b>
        </header>

        <div id="page-home" class="page active"><div id="task-feed"></div></div>
        
        <div id="page-rank" class="page" style="padding:15px;">
            <div id="top-podium" class="podium-box"></div>
            <div id="rank-list"></div>
        </div>
        
        <div id="page-wallet" class="page" style="padding:15px;">
            <div class="task-card" style="padding:20px; border:1px solid var(--p);">
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button class="btn-elite" id="m-bkash" onclick="setMethod('BKASH')" style="background:rgba(255,255,255,0.05); border:1.5px solid var(--p); flex:1;">BKASH</button>
                    <button class="btn-elite" id="m-nagad" onclick="setMethod('NAGAD')" style="background:rgba(255,255,255,0.05); border:1.5px solid transparent; flex:1;">NAGAD</button>
                </div>
                <input type="number" id="w_num" placeholder="নম্বর লিখুন" class="input-elite">
                <input type="number" id="w_amt" placeholder="৳ পরিমাণ" class="input-elite">
                <button class="btn-elite" onclick="handleWithdraw()">উইথড্র রিকোয়েস্ট</button>
            </div>
            <div id="withdraw-list"></div>
        </div>

        <div id="page-refer" class="page" style="padding:15px; text-align:center;">
            <div class="task-card" style="padding:30px; border:1.5px solid var(--g);">
                <p>আপনার রেফার আইডি</p>
                <h1 id="ref_code_display" style="font-size:40px; color:var(--p); margin:15px 0;">...</h1>
                <button class="btn-elite" style="width:auto; padding:10px 40px;" onclick="copyRef()">COPY ID</button>
                <div style="margin-top:20px; display:flex; justify-content:space-around; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                    <div><small>মোট রেফার</small><br><b id="total_ref" style="color:var(--g); font-size:24px;">0</b></div>
                    <div><small>বোনাস</small><br><b style="color:var(--success); font-size:24px;">৳২.০০</b></div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="nav('page-home', this)"><i class="fa-solid fa-house"></i><span>Home</span></div>
            <div class="nav-item" onclick="nav('page-rank', this)"><i class="fa-solid fa-crown"></i><span>Leaders</span></div>
            <div class="nav-item" onclick="nav('page-wallet', this)"><i class="fa-solid fa-wallet"></i><span>Wallet</span></div>
            <div class="nav-item" onclick="nav('page-refer', this)"><i class="fa-solid fa-users"></i><span>Refer</span></div>
        </nav>
    </div>

    <div id="task-details-page">
        <div style="padding:20px; color:var(--p);" onclick="closeTaskPage()"><i class="fa-solid fa-arrow-left"></i> ব্যাক</div>
        <img id="det-img" style="width:100%; max-height:300px; object-fit:contain;">
        <div style="padding:25px;">
            <h1 id="det-title"></h1>
            <b id="det-reward" style="color:var(--success); font-size:28px;"></b>
            <p id="det-desc" style="margin:20px 0; opacity:0.8;"></p>
            <button class="btn-elite" id="det-link-btn" style="background:#fff; color:#000; margin-bottom:10px;">লিঙ্ক ভিজিট করুন</button>
            <input type="text" id="det-proof" class="input-elite" placeholder="প্রমাণ দিন">
            <button class="btn-elite" onclick="submitProof()">সাবমিট প্রুফ</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBL-1gCDQXt7f2s3UVmEAhzotCneBkg1dM", databaseURL: "https://free-income-tax-6d428-default-rtdb.firebaseio.com", projectId: "free-income-tax-6d428" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userUID = localStorage.getItem('app_user_uid');
    let withdrawMethod = "BKASH"; let activeTaskID = null;

    let adTime = 5;
    let adI = setInterval(() => {
        adTime--; document.getElementById('ad-timer').innerText = adTime;
        if(adTime <= 0) {
            clearInterval(adI);
            document.getElementById('ad-screen').style.display='none';
            if(userUID) { startApp(); } else { document.getElementById('auth-screen').style.display='flex'; }
        }
    }, 1000);

    function registerUser() {
        const user = document.getElementById('reg-user').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const cpass = document.getElementById('reg-cpass').value;
        const rID = document.getElementById('reg-ref').value.trim();

        if(!user || !phone || !email || !pass) return Swal.fire('Error', 'সব তথ্য দিন!', 'error');
        if(pass !== cpass) return Swal.fire('Error', 'পাসওয়ার্ড মেলেনি!', 'error');

        const newID = "DE" + Math.floor(100000 + Math.random() * 900000);
        const avatar = `https://ui-avatars.com/api/?name=${user}&background=random&color=fff&bold=true`;

        const data = { uid: newID, name: user, phone: phone, email: email, password: pass, balance: 0, totalEarn: 0, photo: avatar, referCount: 0 };
        db.ref('users/'+newID).set(data).then(() => {
            if(rID && rID != newID) {
                db.ref('users/'+rID).transaction(u => {
                    if(u) { u.balance = (u.balance || 0) + 2; u.totalEarn = (u.totalEarn || 0) + 2; u.referCount = (u.referCount || 0) + 1; }
                    return u;
                });
            }
            localStorage.setItem('app_user_uid', newID); userUID = newID; location.reload();
        });
    }

    function startApp() {
        document.getElementById('auth-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        db.ref('users/'+userUID).on('value', s => {
            let d = s.val(); if(!d) return;
            document.getElementById('u_bal').innerText = "৳ " + (d.balance || 0).toFixed(2);
            document.getElementById('u_name').innerText = d.name;
            document.getElementById('u_pic').src = d.photo;
            document.getElementById('u_id').innerText = "UID: " + userUID;
            document.getElementById('ref_code_display').innerText = userUID;
            document.getElementById('total_ref').innerText = d.referCount || 0;
        });
        loadTasks(); loadRank(); loadHistory();
    }

    function showEmojiPicker() {
        const emojis = ['😎', '💎', '🦁', '🔥', '👑', '🚀', '⭐', '🐯', '🎯', '⚡'];
        let grid = '<div class="emoji-grid">';
        emojis.forEach(e => grid += `<button class="emoji-btn" onclick="updateAvatar('${e}')">${e}</button>`);
        grid += '</div>';
        Swal.fire({ title: 'প্রোফাইল ইমোজি সেট করুন', html: grid, showConfirmButton: false, background: '#111', color: '#fff' });
    }

    function updateAvatar(emoji) {
        const url = `https://ui-avatars.com/api/?name=${emoji}&background=222&color=fff&size=128`;
        db.ref('users/'+userUID).update({ photo: url }).then(() => Swal.close());
    }

    function loadRank() {
        db.ref('users').on('value', s => {
            let a = []; 
            s.forEach(u => {
                let d = u.val();
                if(d.totalEarn === undefined) d.totalEarn = d.balance || 0;
                a.push(d);
            });
            a.sort((x, y) => (y.totalEarn || 0) - (x.totalEarn || 0));

            let pod = ""; let top3 = a.slice(0, 3);
            if(top3[1]) pod += podHtml(top3[1], '🥇', '#FFD700', '65px'); 
            if(top3[0]) pod += podHtml(top3[0], '💎', '#00D2FF', '85px'); 
            if(top3[2]) pod += podHtml(top3[2], '🥉', '#C0C0C0', '65px'); 
            document.getElementById('top-podium').innerHTML = pod;

            let h = "";
            a.slice(3, 10).forEach((u, i) => {
                h += `<div style="display:flex; align-items:center; gap:10px; background:var(--glass); padding:10px; border-radius:12px; margin-bottom:8px; border:1px solid rgba(255,255,255,0.05);">
                    <span style="font-weight:900; width:25px; color:#555;">${i+4}</span>
                    <img src="${u.photo}" style="width:35px; height:35px; border-radius:50%; border:1px solid #444;">
                    <div style="flex:1"><b>${u.name}</b><br><small style="opacity:0.5; font-size:9px;">Total Earning</small></div>
                    <b style="color:var(--success);">৳${(u.totalEarn||0).toFixed(1)}</b>
                </div>`;
            });
            document.getElementById('rank-list').innerHTML = h;
        });
    }

    function podHtml(u, crown, color, sz) {
        return `<div class="podium-item">
            <span class="crown-icon">${crown}</span>
            <img src="${u.photo}" class="pod-img" style="width:${sz}; height:${sz}; border-color:${color}; box-shadow: 0 0 15px ${color}33;">
            <b style="font-size:11px; margin-top:8px;">${u.name.split(' ')[0]}</b>
            <small style="color:${color}; font-weight:900;">৳${(u.totalEarn||0).toFixed(0)}</small>
        </div>`;
    }

    function loadTasks() {
        db.ref('tasks').on('value', ts => {
            db.ref('users/'+userUID+'/completedTasks').on('value', done => {
                let dList = done.val() || {};
                db.ref('proofs').on('value', ps => {
                    let myProofs = {}; ps.forEach(p => { if(p.val().userId == userUID) myProofs[p.val().taskID] = p.val().status; });
                    let h = "";
                    ts.forEach(t => {
                        if(dList[t.key]) return;
                        let d = t.val(); let isPending = myProofs[t.key] === 'pending';
                        h += `<div class="task-card"><img src="${d.image}" class="task-half-img"><div class="task-body"><b>${d.name}</b><span class="price-tag">৳ ${d.reward}</span>
                        <button class="btn-elite" ${isPending?'disabled':''} onclick="openTaskPage('${t.key}')">${isPending?'পেন্ডিং আছে...':'কাজটি শুরু করুন'}</button></div></div>`;
                    });
                    document.getElementById('task-feed').innerHTML = h || "<p style='opacity:0.2; text-align:center; margin-top:50px;'>No Tasks Available</p>";
                });
            });
        });
    }

    function openTaskPage(id) {
        db.ref('tasks/'+id).once('value', s => {
            let t = s.val(); activeTaskID = id;
            document.getElementById('det-img').src = t.image;
            document.getElementById('det-title').innerText = t.name;
            document.getElementById('det-reward').innerText = "৳ " + t.reward;
            document.getElementById('det-desc').innerText = t.desc;
            document.getElementById('det-link-btn').onclick = () => window.open(t.link, '_blank');
            document.getElementById('task-details-page').style.display = 'block';
        });
    }
    function closeTaskPage() { document.getElementById('task-details-page').style.display = 'none'; }
    function submitProof() {
        let p = document.getElementById('det-proof').value.trim();
        if(!p) return Swal.fire('Error', 'প্রমাণ দিন!', 'error');
        db.ref('proofs').push({ userId: userUID, taskID: activeTaskID, proof: p, status: 'pending', time: Date.now() });
        Swal.fire('জমাদান সফল!', 'পেন্ডিং আছে, অ্যাডমিন চেক করবে।', 'success'); closeTaskPage();
    }
    function setMethod(m) { 
        withdrawMethod = m; 
        document.getElementById('m-bkash').style.borderColor = m==='BKASH'?'var(--p)':'transparent';
        document.getElementById('m-nagad').style.borderColor = m==='NAGAD'?'var(--p)':'transparent';
    }
    function handleWithdraw() {
        let amt = parseFloat(document.getElementById('w_amt').value);
        let num = document.getElementById('w_num').value;
        if(amt < 20 || !num) return Swal.fire('Error', 'সঠিক তথ্য দিন!', 'error');
        db.ref('users/'+userUID+'/balance').once('value', s => {
            let b = s.val() || 0; if(b < amt) return Swal.fire('Error', 'ব্যালেন্স নেই!', 'error');
            db.ref('users/'+userUID).update({ balance: b - amt });
            db.ref('withdraws').push({ userId: userUID, amount: amt, number: num, method: withdrawMethod, status: 'pending', time: Date.now() });
            Swal.fire('সফল!', 'উইথড্র রিকোয়েস্ট সেন্ড হয়েছে।', 'success');
        });
    }
    function loadHistory() {
        db.ref('withdraws').orderByChild('userId').equalTo(userUID).on('value', s => {
            let h = ""; s.forEach(c => {
                let d = c.val(); let cl = d.status==='success'?'var(--success)':'var(--g)';
                h = `<div style="background:var(--glass); padding:10px; border-radius:10px; margin-bottom:8px; font-size:12px;"><b>${d.method}</b> <span style="float:right; color:${cl}">${d.status.toUpperCase()}</span><br>৳${d.amount} - ${d.number}</div>` + h;
            });
            document.getElementById('withdraw-list').innerHTML = h;
        });
    }
    function nav(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }
    function copyRef() { navigator.clipboard.writeText(userUID); Swal.fire('Copied!', userUID, 'success'); }
</script>
</body>
                    </html>
