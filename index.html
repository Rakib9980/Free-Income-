<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Premium Interface</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00ffcc;
            --bg-dark: #0a0a0b;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 255, 204, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- ১. টপ প্রোফাইল সেকশন (আপনার বর্ণনা অনুযায়ী) --- */
        .top-profile-bar {
            padding: 20px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--border);
        }

        .mini-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            box-shadow: 0 0 10px var(--accent);
            object-fit: cover;
            margin-right: 15px;
        }

        .user-details { flex: 1; }
        .user-details h4 { margin: 0; font-size: 16px; color: #fff; font-weight: 700; }
        .user-details p { margin: 2px 0 0; font-size: 11px; color: var(--accent); opacity: 0.8; letter-spacing: 1px; }

        /* --- ২. ব্যালেন্স সেকশন (প্রোফাইলের নিচে) --- */
        .balance-section {
            padding: 20px;
            background: linear-gradient(180deg, rgba(0,255,204,0.05) 0%, transparent 100%);
        }

        .bal-card {
            background: var(--card-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .bal-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .bal-amount { 
            font-size: 38px; 
            font-weight: 800; 
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            margin-top: 5px;
        }

        /* --- ৩. পেজ কন্টেন্ট এরিয়া --- */
        .content-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 250px);
            padding-bottom: 100px;
        }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* অপশন কার্ড (Interactive) */
        .option-card {
            background: var(--card-glass);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .option-card:active { background: rgba(0, 255, 204, 0.1); transform: scale(0.98); }

        .opt-icon {
            width: 45px; height: 45px;
            background: rgba(0, 255, 204, 0.1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 20px;
        }

        .opt-info { flex: 1; margin-left: 15px; }
        .opt-info h5 { margin: 0; font-size: 15px; }
        .opt-info p { margin: 3px 0 0; font-size: 10px; color: #666; }

        /* --- ৪. বটম নেভিগেশন (Options) --- */
        .navbar {
            position: fixed; bottom: 0; width: 100%;
            height: 75px; background: #000;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            text-align: center; color: #444; transition: 0.3s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        /* ইনপুট ও বাটন */
        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 15px; background: #111; border: 1px solid #222;
            border-radius: 12px; color: #fff; font-size: 15px;
        }
        .submit-btn {
            width: 100%; padding: 16px; background: var(--accent); color: #000;
            border: none; border-radius: 12px; font-weight: 800; font-size: 14px;
            text-transform: uppercase; margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="top-profile-bar">
        <img src="" id="user-img" class="mini-avatar" alt="User">
        <div class="user-details">
            <h4 id="user-name">LOADING...</h4>
            <p>ID: <span id="user-id">00000000</span></p>
        </div>
        <div style="background:rgba(0,255,204,0.1); padding:5px 10px; border-radius:10px; font-size:10px; color:var(--accent); font-weight:800;">VERIFIED</div>
    </div>

    <div class="balance-section">
        <div class="bal-card">
            <div class="bal-label">Available Balance</div>
            <div class="bal-amount">৳ <span id="balance-val">0.00</span></div>
        </div>
    </div>

    <div class="content-area">
        
        <div id="p-home" class="page active">
            <div class="option-card" onclick="handleBonus()">
                <div class="opt-icon"><i class="fas fa-gift"></i></div>
                <div class="opt-info">
                    <h5>Daily Bonus</h5>
                    <p>Collect your free reward (Every 24h)</p>
                </div>
                <i class="fas fa-chevron-right" style="opacity:0.3"></i>
            </div>

            <div class="option-card" onclick="handleRefer()">
                <div class="opt-icon"><i class="fas fa-user-plus"></i></div>
                <div class="opt-info">
                    <h5>Invite & Earn</h5>
                    <p>Get ৳2.00 per friend</p>
                </div>
                <i class="fas fa-chevron-right" style="opacity:0.3"></i>
            </div>
        </div>

        <div id="p-task" class="page">
            <h4 style="margin-top:0; color:var(--accent); letter-spacing:1px;">ACTIVE MISSIONS</h4>
            <div style="text-align:center; padding:40px 20px; color:#444;">
                <i class="fas fa-briefcase" style="font-size:40px; margin-bottom:15px;"></i>
                <p>No tasks available at the moment.</p>
            </div>
        </div>

        <div id="p-wallet" class="page">
            <h4 style="margin-top:0; color:var(--accent);">WITHDRAW FUNDS</h4>
            <div class="input-group"><input type="number" id="w-amount" placeholder="Enter Amount (Min 10)"></div>
            <div class="input-group"><input type="text" id="w-num" placeholder="Bkash/Nagad Number"></div>
            <button class="submit-btn" onclick="handleWithdraw()">Confirm Withdrawal</button>
        </div>

        <div id="p-history" class="page">
            <h4 style="margin-top:0; color:var(--accent);">HISTORY</h4>
            <p style="text-align:center; color:#444; margin-top:50px;">No transaction history found.</p>
        </div>

    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="switchNav('p-home', this)">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchNav('p-task', this)">
            <i class="fas fa-bolt"></i>
            <span>Task</span>
        </div>
        <div class="nav-item" onclick="switchNav('p-wallet', this)">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </div>
        <div class="nav-item" onclick="switchNav('p-history', this)">
            <i class="fas fa-history"></i>
            <span>History</span>
        </div>
        <div class="nav-item" onclick="tg.openTelegramLink('https://t.me/TEK_PRO_RAKIB_OWNER')">
            <i class="fas fa-headset"></i>
            <span>Support</span>
        </div>
    </nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#0a0a0b';

    // ইউজারের রিয়েল ডাটা অটো-ফেচ
    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
        document.getElementById('user-id').innerText = user.id;
        if (user.photo_url) {
            document.getElementById('user-img').src = user.photo_url;
        } else {
            document.getElementById('user-img').src = "https://ui-avatars.com/api/?background=00ffcc&color=000&name=" + user.first_name;
        }
    }

    // নেভিগেশন সুইচ
    function switchNav(pageId, element) {
        tg.HapticFeedback.impactOccurred('medium');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
    }

    // ডেইলি বোনাস ফাংশন
    function handleBonus() {
        tg.HapticFeedback.notificationOccurred('success');
        tg.showPopup({
            title: 'DAILY REWARD',
            message: 'আপনি কি আজকের ৳০.৫০ বোনাস নিতে চান?',
            buttons: [{id: 'ok', type: 'default', text: 'হ্যাঁ, দিন'}]
        }, (id) => {
            if(id === 'ok') tg.showAlert("✅ বোনাস সফলভাবে যোগ হয়েছে!");
        });
    }

    // রেফার ফাংশন
    function handleRefer() {
        const uid = user ? user.id : '000000';
        const link = `https://t.me/YourBotUser?start=${uid}`;
        tg.showPopup({
            title: 'INVITE FRIENDS',
            message: `আপনার রেফার লিঙ্ক:\n${link}\n\nপ্রতি রেফারে পাবেন ৳২.০০!`,
            buttons: [{type: 'close', text: 'OK'}]
        });
    }

    // উইথড্র ফাংশন
    function handleWithdraw() {
        const amt = document.getElementById('w-amount').value;
        const num = document.getElementById('w-num').value;
        if(amt < 10) {
            tg.showAlert("❌ মিনিমাম উত্তোলন ৳১০.০০");
            return;
        }
        if(!num) {
            tg.showAlert("❌ নাম্বার প্রদান করুন!");
            return;
        }
        tg.HapticFeedback.impactOccurred('heavy');
        tg.showAlert("✅ আপনার রিকোয়েস্ট জমা হয়েছে।");
    }

</script>

</body>
  </html>
